services:
  gluetun:
    image: ghcr.io/qdm12/gluetun:latest  # Uses the latest Gluetun VPN image
    mem_limit: 256M  # Set maximum amount of system ram used
    container_name: gluetun  # Assigns a fixed name to the container for easy reference
    restart: unless-stopped  # Ensures Gluetun restarts if it crashes
    cap_add:
      - NET_ADMIN  # Grants networking privileges required for VPN operation
    devices:
      - /dev/net/tun:/dev/net/tun  # Enables VPN tunneling inside the container
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1  # Disables IPv6 to prevent leaks
    environment:
      - VPN_SERVICE_PROVIDER=${VPN_SERVICE_PROVIDER:-protonvpn}  # Specifies ProtonVPN as the VPN provider
      - VPN_TYPE=wireguard  # Uses WireGuard as the VPN protocol
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}  # Private key for authentication (from .env)
      - SERVER_COUNTRIES=${SERVER_COUNTRIES:-Netherlands}  # Preferred VPN server country selection
      - SERVER_CITIES=${SERVER_CITIES}  # (Optional) Restrict to a specific city
      - VPN_PORT_FORWARDING=${VPN_PORT_FORWARDING:-on}  # Enables automatic port forwarding (needed for torrenting)
      - TZ=${TZ:-UTC}  # Sets the timezone for correct timestamps in logs
      - QBT_WEBUI_ENABLED=${QBT_WEBUI_ENABLED}  # ✅ Ensures Web UI is always enabled
    volumes:
      - ${CONFIG:-.}/gluetun:/gluetun  # Stores VPN configuration persistently
      - ${CONFIG:-.}/gluetun/auth/config.toml:/gluetun/auth/config.toml:ro # Stores AUTH endpoint for automatic API updates from GSM
    ports:
      - "8080:8080"  # ✅ Exposes qBittorrent Web UI to localhost
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://google.com"]  # Checks if the VPN connection is active
      interval: 30s  # Runs every 30 seconds
      timeout: 10s  # Fails if it takes longer than 10 seconds
      retries: 2  # Allows 2 failures before marking the container as unhealthy
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest  # Uses the latest qBittorrent image
    container_name: qbittorrent  # Assigns a fixed name to the container
    mem_limit: 4G  # Set maximum amount of system ram used
    restart: unless-stopped  # Ensures qBittorrent restarts if it crashes
    network_mode: "service:gluetun"  # 🔒 Ensures qBittorrent ONLY works through the VPN (Prevents leaks)
    depends_on:
      gluetun:
        condition: service_healthy  # Ensures qBittorrent starts only when the VPN is fully functional
    environment:
      - PUID=${PUID}  # User ID (ensures correct file permissions)
      - PGID=${PGID}  # Group ID (ensures correct file ownership)
      - TZ=${TZ:-UTC}  # Timezone for logs and schedules
      - WEBUI_PORT=${WEBUI_PORT:-8080}  # Sets qBittorrent's Web UI to port 8080
      - QBITTORRENT_INTERFACE=tun0  # 🔒 Forces all traffic through VPN interface
      - DOCKER_MODS=ghcr.io/t-anc/gsp-qbittorent-gluetun-sync-port-mod:main
      - GSP_GTN_API_KEY=${GSP_GTN_API_KEY:-randomapikey}  # API key for port forwarding updates
      - GSP_QBITTORRENT_PORT=${GSP_QBITTORRENT_PORT:-53764}  # Torrenting port (auto-updated by Gluetun)
      - GSP_MINIMAL_LOGS=${GSP_MINIMAL_LOGS}  # Enables full logs for debugging purposes
      - BT4G_BYPARR=${BT4G_BYPARR:-http://localhost:8191/v1}   # bt4gprx plugin → Byparr
      - BT4G_LOG_LEVEL=${BT4G_LOG_LEVEL:-ERROR}  # bt4gprx plugin logging level
    volumes:
      - ${CONFIG:-.}/config:/config   # Stores qBittorrent settings and plugins persistently
      - ${CONFIG:-.}/incomplete:/incomplete  # ⚡ Temporary download location (reduces SSD wear)
      - ${CONFIG:-.}/DONE:/downloads  # ✅ Completed torrents move here
    ulimits:
      nofile:
        soft: 32768
        hard: 65536  # Increases allowed open files (important for high-speed torrenting)
  byparr:
    image: ghcr.io/thephaseless/byparr:latest
    container_name: byparr
    mem_limit: 2G  # browser stack is heavier than FlareSolverr
    shm_size: 2gb  # Give Chrome enough shared memory to avoid crashes
    #profiles: ["donotstart"]
    restart: unless-stopped  # Restart if it crashes
    network_mode: "service:gluetun"  # 🔒 Same namespace as qBittorrent → reachable at localhost:8191, egresses via VPN
    depends_on:
      gluetun:
        condition: service_healthy  # Start only once the VPN is up
    environment:
      - LOG_LEVEL=${BYPARR_LOG_LEVEL:-info}  # Byparr log verbosity
      - TZ=${TZ:-UTC}  # Timezone for logs